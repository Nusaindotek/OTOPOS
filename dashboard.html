<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - OTOPOS</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Chart.js buat grafik -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Warna Tosca OTOPOS -->
  <style>
    :root {
      --bs-primary: #14B3B5;
      --bs-primary-rgb: 20, 179, 181;
    }
    .btn-primary, .bg-primary, .navbar {
      background-color: var(--bs-primary) !important;
      border-color: var(--bs-primary) !important;
    }
    .btn-primary:hover {
      background-color: #0f8f91 !important;
      border-color: #0f8f91 !important;
    }
    .text-primary { color: var(--bs-primary) !important; }
    .card { border-radius: 15px; border: none; }
    .stat-card h3 { font-size: 1.5rem; font-weight: bold; }
  </style>
</head>
<body class="bg-light">

  <!-- HEADER -->
  <nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">🔧 OTOPOS</span>
      <div class="text-end">
        <small class="d-block">Bengkel Maju Jaya</small>
        <small>Login: Owner - Budi</small>
      </div>
    </div>
  </nav>

  <div class="container py-3">
    
    <!-- 1. STATS RINGKASAN -->
    <div class="row g-2 mb-3">
      <div class="col-6">
        <div class="card shadow-sm stat-card text-center p-2">
          <small class="text-muted">Omset Hari Ini</small>
          <h3 class="text-primary">Rp 1.2jt</h3>
        </div>
      </div>
      <div class="col-6">
        <div class="card shadow-sm stat-card text-center p-2">
          <small class="text-muted">Kendaraan Masuk</small>
          <h3 class="text-primary">8 Unit</h3>
        </div>
      </div>
      <div class="col-6">
        <div class="card shadow-sm stat-card text-center p-2">
          <small class="text-muted">Selesai</small>
          <h3 class="text-success">5 Unit</h3>
        </div>
      </div>
      <div class="col-6">
        <div class="card shadow-sm stat-card text-center p-2">
          <small class="text-muted">Antrian</small>
          <h3 class="text-warning">3 Unit</h3>
        </div>
      </div>
    </div>

    <!-- 2. GRAFIK PENJUALAN -->
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <h6 class="fw-bold">Grafik Penjualan 7 Hari</h6>
        <canvas id="grafikOmset" height="120"></canvas>
      </div>
    </div>

    <!-- 3. MENU UTAMA 6 TOMBOL -->
    <h6 class="fw-bold mb-2">Menu Utama</h6>
    <div class="row g-2">
      <div class="col-6">
        <button class="btn btn-primary w-100 py-3">🚗<br><small>Antrian</small></button>
      </div>
      <div class="col-6">
        <button class="btn btn-primary w-100 py-3">🧾<br><small>Kasir Service</small></button>
      </div>
      <div class="col-6">
        <button class="btn btn-primary w-100 py-3">🔧<br><small>Daftar Part</small></button>
      </div>
      <div class="col-6">
        <button class="btn btn-primary w-100 py-3">👨‍🔧<br><small>Daftar Mekanik</small></button>
      </div>
      <div class="col-6">
        <button class="btn btn-primary w-100 py-3">📊<br><small>Laporan</small></button>
      </div>
      <div class="col-6">
        <button class="btn btn-primary w-100 py-3">⚙️<br><small>Setting</small></button>
      </div>
    </div>

    <!-- FOOTER -->
    <p class="text-center text-muted small mt-4">OTOPOS v1.0 - Kasir Digital Bengkel</p>
    <button class="btn btn-outline-danger w-100">Logout</button>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Contoh Grafik
    const ctx = document.getElementById('grafikOmset');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
        datasets: [{
          label: 'Omset Rp',
          data: [1200000, 1500000, 900000, 1800000, 2100000, 2500000, 1300000],
          backgroundColor: '#14B3B5'
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });
  </script>
</body>
</html>
