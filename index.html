<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>OTOPOS Bengkel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-home" class="page active">
        <h2>OTOPOS Bengkel</h2>
        <button class="btn btn-main" onclick="navigateTo('page-kasir')">💰 Kasir</button>
        <button class="btn btn-main" onclick="navigateTo('page-stok')">📦 Daftar Part</button>
        <button class="btn btn-main" onclick="navigateTo('page-riwayat')">📜 Riwayat</button>
        <button class="btn btn-main" onclick="navigateTo('page-mekanik')">👨‍🔧 Mekanik</button>
        <button class="btn btn-main" onclick="navigateTo('page-setting')">⚙️ Pengaturan</button>
    </div>

    <div id="page-kasir" class="page">
        <button class="btn btn-back" onclick="navigateTo('page-home')">⬅ Kembali ke Menu</button>
        <h3>Kasir</h3>
        <div style="display: flex; gap: 5px;">
            <button id="tab-perbaikan" class="btn btn-tab active-tab" onclick="setMode('Perbaikan')">🔧 Perbaikan</button>
            <button id="tab-part" class="btn btn-tab" onclick="setMode('Part')">📦 Beli Part</button>
        </div>
        <div class="card" style="margin-top:10px;">
            <label>Nama Pelanggan</label>
            <input type="text" id="in-nama">
            <div id="group-mekanik">
                <label>Mekanik</label>
                <select id="in-mekanik"><option>Mekanik A</option><option>Mekanik B</option></select>
            </div>
            <div id="group-biaya">
                <label>Ongkos Mekanik (Rp)</label>
                <input type="number" id="in-biaya">
            </div>
            <button class="btn btn-main" onclick="simpanTransaksi()">Simpan Transaksi</button>
        </div>
    </div>

    <div id="page-stok" class="page">
        <button class="btn btn-back" onclick="navigateTo('page-home')">⬅ Kembali</button>
        <h3>Daftar Part</h3>
    </div>

    <div id="page-riwayat" class="page">
        <button class="btn btn-back" onclick="navigateTo('page-home')">⬅ Kembali</button>
        <h3>Riwayat Transaksi</h3>
    </div>

    <div id="page-mekanik" class="page">
        <button class="btn btn-back" onclick="navigateTo('page-home')">⬅ Kembali</button>
        <h3>Daftar Mekanik</h3>
    </div>

    <div id="page-setting" class="page">
        <button class="btn btn-back" onclick="navigateTo('page-home')">⬅ Kembali</button>
        <h3>Pengaturan</h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
