<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOPOS - Offline POS Bengkel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="view-home">

    <div class="app-header-bar">
        <h2 id="header-title" class="centered-title">HOME</h2>
    </div>

    <div class="app-content">
        <!-- PAGE HOME -->
        <div id="page-home" class="page-container">
            <div class="profile-card"><h2 id="display-nama-bengkel">Bengkel Maju Motor</h2></div>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-label">Omset</span><h2 id="stat-omset">Rp 0</h2></div>
                <div class="stat-box"><span class="stat-label">Selesai</span><h2 id="stat-selesai">0</h2></div>
            </div>
            <div class="menu-list">
                <div class="menu-item" onclick="navigateTo('kasir')"><span>💰</span> Kasir</div>
                <div class="menu-item" onclick="navigateTo('mekanik')"><span>👨‍🔧</span> Daftar Mekanik</div>
                <div class="menu-item" onclick="navigateTo('setting')"><span>⚙️</span> Pengaturan</div>
            </div>
        </div>

        <!-- PAGE KASIR -->
        <div id="page-kasir" class="page-container">
            <button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali ke Utama</button>
            <div class="card">
                <h3>Transaksi Baru</h3>
                <div class="form-group">
                    <label>Jenis Transaksi</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <button class="btn btn-primary" onclick="setJenis('Perbaikan')" id="btn-perbaikan">🔧 Perbaikan</button>
                        <button class="btn btn-secondary" onclick="setJenis('Part')" id="btn-part">📦 Beli Part</button>
                    </div>
                </div>
                <div class="form-group"><label>Nama Pelanggan/Kendaraan</label><input type="text" id="kasir-nama"></div>
                <div class="form-group" id="group-mekanik"><label>Pilih Mekanik</label><select id="kasir-mekanik"></select></div>
                <div class="form-group"><label>Biaya (Rp)</label><input type="number" id="kasir-biaya"></div>
                <button class="btn btn-primary" style="width:100%" onclick="prosesTransaksi()">Proses & Simpan Transaksi</button>
            </div>
        </div>

        <!-- PAGE MEKANIK -->
        <div id="page-mekanik" class="page-container">
            <button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali ke Utama</button>
            <div class="card">
                <h3>Tambah Mekanik</h3>
                <div class="form-group"><input type="text" id="input-nama-mekanik" placeholder="Nama Mekanik"></div>
                <button class="btn btn-primary" onclick="tambahMekanik()">Daftarkan Mekanik</button>
            </div>
            <div class="card">
                <h3>Daftar Mekanik Aktif</h3>
                <div id="list-mekanik"></div>
            </div>
        </div>

        <!-- PAGE SETTING -->
        <div id="page-setting" class="page-container">
            <button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali ke Utama</button>
            <div class="card">
                <h3>Identitas Bengkel</h3>
                <div class="form-group"><label>Nama Bengkel</label><input type="text" id="set-nama-bengkel"></div>
                <div class="form-group"><label>URL Logo</label><input type="text" id="set-logo"></div>
                <div class="form-group"><label>Footer Struk</label><input type="text" id="set-footer"></div>
                <button class="btn btn-primary" onclick="simpanPengaturan()">Simpan Pengaturan</button>
            </div>
            <div class="card">
                <h3>Status & Bantuan</h3>
                <button class="btn btn-secondary" onclick="hubungiCS()">📧 Hubungi CS (NusaIndo Teknologi)</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
