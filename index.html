<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOPOS - Aplikasi Kasir Bengkel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="view-home">

    <div class="app-header-bar">
        <h2 id="header-title" class="centered-title">HOME</h2>
    </div>

    <div class="app-content">
        <!-- HOME -->
        <div id="page-home" class="page-container">
            <div class="profile-card">
                <h2>Bengkel Maju Motor</h2>
            </div>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-label">Omset</span><h2 id="stat-omset">Rp 0</h2></div>
                <div class="stat-box"><span class="stat-label">Selesai</span><h2 id="stat-selesai">0</h2></div>
            </div>
            <div class="menu-list">
                <div class="menu-item" onclick="navigateTo('servis')"><span>🏍️</span> Kendaraan Ditangani</div>
                <div class="menu-item" onclick="navigateTo('mekanik')"><span>👨‍🔧</span> Daftar Mekanik</div>
                <div class="menu-item" onclick="navigateTo('setting')"><span>⚙️</span> Pengaturan</div>
            </div>
        </div>

        <!-- MEKANIK -->
        <div id="page-mekanik" class="page-container">
            <button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali</button>
            <div class="card">
                <h3>Tambah Mekanik</h3>
                <div class="form-group">
                    <input type="text" id="input-nama-mekanik" placeholder="Nama Mekanik">
                </div>
                <button class="btn btn-primary" onclick="tambahMekanik()">Daftarkan Mekanik</button>
            </div>
            <div class="card">
                <h3>Daftar Mekanik Aktif</h3>
                <div id="list-mekanik"></div>
            </div>
        </div>

        <!-- PENGATURAN -->
        <div id="page-setting" class="page-container">
            <button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali</button>
            <div class="card">
                <h3>Identitas Bengkel</h3>
                <input type="text" id="set-nama-bengkel" placeholder="Nama Bengkel">
                <button class="btn btn-primary mt-2" onclick="simpanPengaturan()">Simpan</button>
            </div>
            <div class="card bg-blue-light">
                <h3>Pusat Bantuan</h3>
                <button class="btn btn-secondary" onclick="hubungiCS()">📧 Hubungi via Email</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="navigateTo('home')"><span>🏠</span>Home</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
