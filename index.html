<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOPOS - Bengkel System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { position: absolute; left: 0; top: 0; width: 100%; }
        }
        #cart-items::-webkit-scrollbar { width: 4px; }
        #cart-items::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <!-- 1. VIEW DASHBOARD (Tampilan Kasir) -->
    <div id="view-dashboard">
        <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🛠️</span>
                <div>
                    <h1 class="text-lg font-black tracking-wider">OTOPOS</h1>
                    <p class="text-xs text-blue-200">System Bengkel</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="showSettings()" class="bg-blue-800 hover:bg-blue-900 px-4 py-2 rounded-lg transition font-bold text-sm shadow">
                    ⚙️ Pengaturan (F4)
                </button>
            </div>
        </header>

        <main class="p-4 grid grid-cols-12 gap-4">
            <!-- Panel Kasir (Sama seperti sebelumnya) -->
            <div class="col-span-12 lg:col-span-7 bg-white rounded-xl shadow border p-5">
                <!-- [Konten Kasir Tetap Sama] -->
                <div class="grid grid-cols-2 p-1 bg-gray-100 rounded-xl mb-4">
                    <button onclick="setMode('servis')" class="py-2 rounded-lg font-black text-sm bg-red-600 text-white">MODE SERVIS</button>
                    <button onclick="setMode('part')" class="py-2 rounded-lg font-black text-sm text-gray-500">JUAL PART</button>
                </div>
                
                <div id="group-servis" class="mb-4 pb-4 border-b">
                    <label class="text-xs font-bold text-gray-500">NOPOL</label>
                    <input type="text" id="input-nopol" class="w-full border rounded p-2 text-sm uppercase">
                </div>

                <label class="text-xs font-bold text-gray-500">CARI PRODUK</label>
                <input type="text" id="input-produk-search" list="list-produk" class="w-full border rounded p-2 mb-4">
                <datalist id="list-produk"></datalist>

                <button onclick="tambahKeBilling()" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg">TAMBAH KE KERANJANG</button>
            </div>

            <aside class="col-span-12 lg:col-span-5 bg-slate-900 text-white rounded-xl p-5">
                <h2 class="font-bold mb-4 text-emerald-400">🛒 KERANJANG</h2>
                <div id="cart-items" class="h-64 overflow-y-auto mb-4"></div>
                <div class="border-t pt-4 text-xl font-bold flex justify-between">
                    <span>Total:</span>
                    <span id="cart-total">Rp 0</span>
                </div>
                <button onclick="prosesCheckout()" class="w-full bg-emerald-500 text-black font-bold py-3 mt-4 rounded-lg">CETAK STRUK (Ctrl+P)</button>
            </aside>
        </main>
    </div>

    <!-- 2. VIEW SETTINGS (Tampilan Pengaturan Penuh) -->
    <div id="view-settings" class="hidden min-h-screen bg-gray-50 p-8">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-gray-800">⚙️ Pengaturan Data Part</h2>
                <button onclick="hideSettings()" class="bg-gray-200 px-4 py-2 rounded-lg font-bold text-sm hover:bg-gray-300">Kembali (Esc)</button>
            </div>

            <div class="space-y-8">
                <!-- Import CSV -->
                <section class="border-b pb-8">
                    <h3 class="font-bold text-blue-600 mb-2">📥 Import Data (Bulk)</h3>
                    <p class="text-xs text-gray-500 mb-3">Format: Nama Part,Harga (Contoh: Oli,50000)</p>
                    <textarea id="csv-input" class="w-full h-32 border rounded-lg p-3 text-xs font-mono" placeholder="Masukkan data CSV di sini..."></textarea>
                    <button onclick="handleImportCSV()" class="w-full bg-blue-600 text-white font-bold py-3 mt-3 rounded-lg">Proses Import</button>
                </section>

                <!-- Manual Add -->
                <section>
                    <h3 class="font-bold text-emerald-600 mb-2">➕ Tambah Manual</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="manual-name" placeholder="Nama Part" class="border p-3 rounded-lg text-sm">
                        <input type="number" id="manual-price" placeholder="Harga" class="border p-3 rounded-lg text-sm">
                    </div>
                    <button onclick="handleManualAdd()" class="w-full bg-emerald-600 text-white font-bold py-3 mt-3 rounded-lg">Simpan Part</button>
                </section>
            </div>
        </div>
    </div>

    <!-- PRINT AREA -->
    <div id="print-receipt" class="hidden font-mono p-4 w-[58mm] text-[8px]">
        <div class="text-center font-bold">BENGKEL HELICOPTER</div>
        <hr class="my-2">
        <div id="print-items"></div>
        <div class="font-bold text-right" id="print-total"></div>
    </div>

    <script>
        // --- DATA ---
        let cart = JSON.parse(localStorage.getItem('otopos_cart')) || [];
        let parts = JSON.parse(localStorage.getItem('otopos_parts')) || [];

        // --- NAVIGATION ---
        function showSettings() {
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('view-settings').classList.remove('hidden');
        }

        function hideSettings() {
            document.getElementById('view-dashboard').classList.remove('hidden');
            document.getElementById('view-settings').classList.add('hidden');
        }

        // --- SHORTCUTS ---
        document.addEventListener('keydown', (e) => {
            if(e.key === 'F4') { e.preventDefault(); showSettings(); }
            if(e.key === 'Escape') { hideSettings(); }
            if(e.ctrlKey && e.key === 'p') { e.preventDefault(); prosesCheckout(); }
        });

        // --- LOGIC ---
        function refreshDatalist() {
            const list = document.getElementById('list-produk');
            list.innerHTML = parts.map(p => `<option value="${p.name}" data-price="${p.price}">`).join('');
        }

        function handleImportCSV() {
            const text = document.getElementById('csv-input').value;
            text.split('\n').forEach(line => {
                const [name, price] = line.split(',');
                if(name && price) parts.push({name: name.trim(), price: parseInt(price)});
            });
            localStorage.setItem('otopos_parts', JSON.stringify(parts));
            refreshDatalist();
            alert('Import Berhasil!');
        }

        function handleManualAdd() {
            const name = document.getElementById('manual-name').value;
            const price = document.getElementById('manual-price').value;
            if(name && price) {
                parts.push({name, price: parseInt(price)});
                localStorage.setItem('otopos_parts', JSON.stringify(parts));
                refreshDatalist();
                alert('Part tersimpan');
            }
        }

        function tambahKeBilling() {
            const name = document.getElementById('input-produk-search').value;
            const item = parts.find(p => p.name === name);
            if(!item) return alert('Produk tidak ditemukan!');
            cart.push({ ...item, qty: 1 });
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `
                <div class="flex justify-between bg-slate-800 p-2 rounded text-xs mb-2">
                    <span>${i.name}</span> <span>Rp ${i.price.toLocaleString()}</span>
                </div>
            `).join('');
            const total = cart.reduce((acc, curr) => acc + curr.price, 0);
            document.getElementById('cart-total').innerText = 'Rp ' + total.toLocaleString();
        }

        function prosesCheckout() { window.print(); }

        window.onload = refreshDatalist;
    </script>
</body>
</html>
