<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOPOS - Bengkel System</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f7f9fa; color: #333; padding-bottom: 70px; }

        /* Header Navigation - UDAH DIKOREKSI */
        .header { background-color: #0066ff; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: center; } /* space-between -> center */
        .header h2 { font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-back { background: none; border: none; color: white; font-size: 20px; cursor: pointer; display: none; position: absolute; left: 15px; } /* kasih absolute biar back tetep kiri */
        .btn-add-top { background: white; color: #0066ff; border: none; padding: 5px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; position: absolute; right: 15px; } /* kasih absolute biar tetep kanan */
        
        /* .header-logo DIHAPUS TOTAL */

        /* Banner Bengkel */
        .banner { background-color: #0056d6; color: white; text-align: center; padding: 15px; margin-bottom: 15px; border-radius: 0 0 15px 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .banner-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: white; margin-bottom: 8px; display: none; border: 2px solid white; }
        .banner h3 { margin-bottom: 5px; font-size: 20px; }
        .banner p { font-size: 12px; opacity: 0.9; }
        
        /* ... sisa CSS kamu biarkan sama semua ... */
        
        .container { padding: 12px; max-width: 600px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .card-title { font-size: 15px; font-weight: bold; margin-bottom: 12px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-box { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; text-align: center; }
        .stat-box.full { grid-column: span 2; background: #fffde7; }
        .stat-box span { font-size: 11px; color: #666; display: block; }
        .stat-box h2 { font-size: 20px; color: #27ae60; margin-top: 4px; font-weight: bold; }
        .stat-box h3 { font-size: 18px; color: #f39c12; margin-top: 4px; }
        .menu-item { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .menu-item:active { background: #f0f0f0; }
        .menu-icon { font-size: 24px; margin-right: 15px; }
        .menu-text h4 { font-size: 14px; margin-bottom: 2px; }
        .menu-text p { font-size: 11px; color: #888; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #555; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .btn-block { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; text-align: center; display: block; }
        .btn-primary { background-color: #0066ff; color: white; }
        .btn-success { background-color: #27ae60; color: white; }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-outline { background-color: transparent; border: 1px solid #0066ff; color: #0066ff; }
        .toggle-group { display: flex; background: #eee; border-radius: 6px; padding: 3px; margin-bottom: 15px; }
        .toggle-btn { flex: 1; text-align: center; padding: 8px; font-size: 12px; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; background: transparent; color: #666; }
        .btn-circle { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #ccc; background: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-circle.minus { border-color: #e74c3c; color: #e74c3c; }
        .btn-circle.plus { border-color: #27ae60; color: #27ae60; }
        .part-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .part-box { background: #f0f7ff; border: 1px solid #cce0ff; border-radius: 6px; padding: 12px 5px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .part-box .qty { font-size: 18px; font-weight: bold; color: #0066ff; margin-bottom: 4px; }
        .part-box .name { font-size: 11px; color: #555; line-height: 1.2; }
        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e0e0e0; display: flex; height: 60px; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { text-align: center; color: #888; cursor: pointer; flex: 1; padding: 8px; font-size: 11px; text-decoration: none; }
        .nav-item.active { color: #0066ff; font-weight: bold; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
        .logo-preview { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; border: 1px dashed #ccc; display: block; margin-top: 8px; background: #f9f9f9; }
        .cs-box { background: #f0f7ff; border: 1px dashed #0066ff; border-radius: 8px; padding: 14px; margin-top: 20px; text-align: center; }
        .cs-link { display: inline-flex; align-items: center; margin: 5px 10px; color: #0066ff; text-decoration: none; font-size: 13px; font-weight: bold; }
        .text-green { color: #27ae60; font-weight: bold; }
        .text-bold { font-weight: bold; }
        .badge { background: #e8f4fd; color: #0066ff; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #e0e0e0; }
        .list-row:last-child { border-bottom: none; }
        .btn-danger-sm { background: none; border: 1px solid #e74c3c; color: #e74c3c; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .stock-control { display: flex; align-items: center; gap: 8px; }
    </style>
</head>
