<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOPOS - Offline POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="view-home">
    <div class="app-header-bar"><h2 id="header-title" class="centered-title">HOME</h2></div>
    <div class="app-content">
        <!-- HOME -->
        <div id="page-home" class="page-container">
            <div class="profile-card"><h2 id="display-nama-bengkel">Bengkel Maju Motor</h2></div>
            <div class="menu-list">
                <div class="menu-item" onclick="navigateTo('kasir')">💰 Kasir</div>
                <div class="menu-item" onclick="navigateTo('stok')">📦 Daftar Part</div>
                <div class="menu-item" onclick="navigateTo('riwayat')">📜 Riwayat</div>
                <div class="menu-item" onclick="navigateTo('mekanik')">👨‍🔧 Mekanik</div>
                <div class="menu-item" onclick="navigateTo('setting')">⚙️ Pengaturan</div>
            </div>
        </div>

        <!-- KASIR -->
        <div id="page-kasir" class="page-container">
            <button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali</button>
            <div class="card">
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button class="btn btn-primary" onclick="setJenis('Perbaikan')" id="btn-perbaikan">🔧 Perbaikan</button>
                    <button class="btn btn-secondary" onclick="setJenis('Part')" id="btn-part">📦 Beli Part</button>
                </div>
                <div class="form-group"><label>Nama Pelanggan</label><input type="text" id="kasir-nama"></div>
                <div class="form-group" id="group-mekanik"><label>Pilih Mekanik</label><select id="kasir-mekanik"></select></div>
                
                <!-- Input biaya ini akan disembunyikan jika pilih Beli Part -->
                <div class="form-group" id="group-biaya">
                    <label id="label-biaya">Ongkos Mekanik (Rp)</label>
                    <input type="number" id="kasir-biaya">
                </div>
                
                <button class="btn btn-primary" style="width:100%" onclick="prosesTransaksi()">Simpan Transaksi</button>
            </div>
        </div>

        <!-- STOK, RIWAYAT, MEKANIK, SETTING -->
        <div id="page-stok" class="page-container"><button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali</button><div id="list-stok"></div></div>
        <div id="page-riwayat" class="page-container"><button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali</button><div id="list-riwayat"></div></div>
        <div id="page-mekanik" class="page-container"><button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali</button><div id="list-mekanik"></div></div>
        <div id="page-setting" class="page-container"><button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali</button><input type="text" id="set-nama-bengkel"><button class="btn btn-primary" onclick="simpanPengaturan()">Simpan</button></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
