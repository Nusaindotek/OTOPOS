<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOPOS - Offline POS Bengkel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="view-home">

    <div class="app-header-bar">
        <h2 id="header-title" class="centered-title">HOME</h2>
    </div>

    <div class="app-content">
        <!-- PAGE HOME -->
        <div id="page-home" class="page-container">
            <div class="profile-card"><h2 id="display-nama-bengkel">Bengkel Maju Motor</h2></div>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-label">Omset</span><h2 id="stat-omset">Rp 0</h2></div>
                <div class="stat-box"><span class="stat-label">Selesai</span><h2 id="stat-selesai">0</h2></div>
            </div>
            <div class="menu-list">
                <div class="menu-item" onclick="navigateTo('kasir')"><span>💰</span> Kasir</div>
                <div class="menu-item" onclick="navigateTo('riwayat')"><span>📜</span> Riwayat Transaksi</div>
                <div class="menu-item" onclick="navigateTo('mekanik')"><span>👨‍🔧</span> Daftar Mekanik</div>
                <div class="menu-item" onclick="navigateTo('setting')"><span>⚙️</span> Pengaturan</div>
            </div>
        </div>

        <!-- PAGE KASIR & LAINNYA (Sama seperti sebelumnya) -->
        <!-- [TIDAK ADA PERUBAHAN DI SINI] -->

        <!-- PAGE RIWAYAT -->
        <div id="page-riwayat" class="page-container">
            <button class="btn btn-secondary mb-3" onclick="navigateTo('home')">⬅ Kembali ke Utama</button>
            <div class="card">
                <h3>Daftar Transaksi</h3>
                <div id="list-riwayat"></div>
            </div>
        </div>
        
        <!-- Tambahkan sisa halaman lainnya di sini -->
    </div>
    <script src="script.js"></script>
</body>
</html>
