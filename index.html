<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OtoPOS - Kasir Bengkel Motor</title>
    <!-- Hubungkan ke CSS Eksternal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- HEADER / TOPBAR -->
        <header class="topbar">
            <h1 id="bengkelName">OtoPOS</h1>
            <div class="mode-indicator">
                Mode Aktif: <span id="lblMode" class="badge badge-part">DIRECT PART (TANPA SERVIS)</span>
            </div>
            <div class="action-buttons">
                <button onclick="setModeKasir('part')" class="btn btn-secondary">Mode Jual Part</button>
                <button onclick="setModeKasir('servis')" class="btn btn-primary">Mode Servis</button>
            </div>
        </header>

        <!-- MAIN LAYOUT (SPLIT SCREEN PC) -->
        <main class="main-content">
            
            <!-- KOLOM KIRI: Transaksi & Keranjang -->
            <section class="left-panel">
                <div class="card">
                    <h2>Keranjang Belanja / Detail Servis</h2>
                    
                    <!-- Form input data kendaraan (Hanya muncul jika mode Servis) -->
                    <div id="formKendaraan" class="form-group hidden">
                        <input type="text" id="txtPlat" placeholder="No. Plat Motor (Contoh: D 1234 AB)">
                        <input type="text" id="txtMotor" placeholder="Tipe Motor (Contoh: Vario 150)">
                        <select id="selMekanik">
                            <option value="">-- Pilih Mekanik --</option>
                            <!-- Diisi dinamis via JS -->
                        </select>
                    </div>

                    <!-- Tabel Item Keranjang -->
                    <table class="pos-table">
                        <thead>
                            <tr>
                                <th>Item / Jasa</th>
                                <th width="100">Harga</th>
                                <th width="70">Qty</th>
                                <th width="100">Subtotal</th>
                                <th width="50">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="cartItems">
                            <!-- Diisi dinamis via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- KOLOM KANAN: Cari Item & Kalkulator Pembayaran -->
            <section class="right-panel">
                <!-- Cari Barang / Jasa -->
                <div class="card">
                    <h2>Pencarian Item (F2)</h2>
                    <input type="text" id="txtCari" placeholder="Ketik nama part, kode barcode, atau jasa..." onkeyup="cariItem()">
                    <div id="searchResult" class="search-results-box">
                        <!-- Hasil pencarian muncul di sini -->
                    </div>
                </div>

                <!-- Pembayaran -->
                <div class="card payment-card">
                    <h2>Kalkulator Pembayaran (F12)</h2>
                    <div class="payment-row">
                        <span>Subtotal</span>
                        <span id="lblSubtotal">Rp0</span>
                    </div>
                    <div class="payment-row">
                        <span>Diskon (Rp)</span>
                        <input type="number" id="numDiskon" value="0" oninput="hitungTotalAkhir()">
                    </div>
                    <div class="payment-row grand-total-row">
                        <span>TOTAL AKHIR</span>
                        <span id="lblTotalAkhir">Rp0</span>
                    </div>
                    <div class="payment-row">
                        <span>Bayar (F12)</span>
                        <input type="number" id="numBayar" placeholder="Masukkan jumlah uang" oninput="hitungKembalian()">
                    </div>
                    <div class="payment-row kembalian-row">
                        <span>Kembalian</span>
                        <span id="lblKembalian">Rp0</span>
                    </div>
                    
                    <button class="btn-checkout" onclick="prosesSimpanTransaksi()">PROSES & CETAK STRUK</button>
                </div>
            </section>
        </main>
    </div>

    <!-- IFRAME TERSEMBUNYI UNTUK CETAK STRUK SECARA SILENT -->
    <iframe id="printFrame" style="display: none;"></iframe>

    <!-- Hubungkan ke JS Eksternal -->
    <script src="app.js"></script>
</body>
</html>
