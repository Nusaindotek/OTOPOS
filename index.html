<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OTOPOS - Bengkel System Desktop</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS Utama -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100">

<div id="app" class="min-h-screen flex flex-col">


    <!-- ================= HEADER ================= -->

    <header class="bg-blue-700 text-white h-16 flex items-center justify-between px-6 shadow">

        <div class="flex items-center gap-3">
            <span class="text-3xl">🛠️</span>

            <div>
                <h1 class="font-black text-xl tracking-wider">
                    OTOPOS
                </h1>

                <p class="text-xs text-blue-200">
                    Bengkel Maju Motor
                </p>
            </div>
        </div>



        <!-- MENU SETTING -->

        <div class="relative">

            <button 
                onclick="toggleSettingMenu()"
                class="hover:bg-blue-800 rounded-full p-3 text-xl">
                ⚙️
            </button>


            <div id="settingMenu"
                 class="hidden absolute right-0 mt-2 w-60 bg-white text-gray-700 rounded-xl shadow-xl border overflow-hidden z-50">


                <button onclick="bukaMenu('mekanik')"
                    class="menu-setting">
                    👨‍🔧 Data Mekanik
                </button>


                <button onclick="bukaMenu('part')"
                    class="menu-setting">
                    📦 Master Part
                </button>


                <button onclick="bukaMenu('supplier')"
                    class="menu-setting">
                    🏭 Supplier
                </button>


                <button onclick="bukaMenu('motor')"
                    class="menu-setting">
                    🚲 Data Motor
                </button>


                <button onclick="bukaMenu('tarif')"
                    class="menu-setting">
                    💰 Tarif Jasa
                </button>


                <button onclick="bukaMenu('user')"
                    class="menu-setting">
                    👤 Pengguna
                </button>


                <button onclick="bukaMenu('system')"
                    class="menu-setting">
                    ⚙️ Pengaturan Sistem
                </button>


            </div>

        </div>

    </header>





    <!-- ================= DASHBOARD ================= -->


    <main class="flex-1 p-6">


        <div class="grid grid-cols-3 gap-5">



            <!-- PANEL SERVIS -->

            <section class="panel">

                <div class="panel-header bg-red-600">
                    🔴 DATA SERVIS
                </div>


                <button onclick="bukaModalTambahServis()"
                    class="btn-primary bg-red-500 hover:bg-red-600">

                    ➕ Terima Motor

                </button>


                <div class="mt-4">

                    <h3 class="judul-list">
                        Antrean Servis
                    </h3>


                    <div id="antrean-container"
                         class="space-y-2">

                    </div>


                </div>


            </section>





            <!-- PANEL KASIR -->


            <section class="panel">

                <div class="panel-header bg-emerald-600">
                    🟢 KASIR
                </div>


                <button onclick="bukaModalJualLangsung()"
                    class="btn-primary bg-emerald-500 hover:bg-emerald-600">

                    ➕ Penjualan

                </button>


                <div class="mt-4">

                    <h3 class="judul-list">
                        Transaksi
                    </h3>


                    <div id="pesanan-container"
                         class="space-y-2">

                    </div>


                </div>


            </section>





            <!-- PANEL INFO -->


            <section class="panel">


                <div class="panel-header bg-blue-600">
                    📊 INFORMASI
                </div>



                <div class="stat-card">

                    <span>
                        Omset Hari Ini
                    </span>


                    <strong id="omset-text">
                        Rp 0
                    </strong>

                </div>



                <div class="stat-card">

                    <span>
                        Motor Selesai
                    </span>


                    <strong id="selesai-count">
                        0
                    </strong>

                </div>



            </section>


        </div>


    </main>





    <!-- ================= AREA MODAL ================= -->



    <div id="modal-container">

        <!-- Modal akan dimuat oleh JavaScript -->

    </div>





    <!-- ================= FOOTER ================= -->


    <footer class="bg-white border-t p-4 text-center text-xs text-gray-500">

        OTOPOS © 2026 | Sistem Manajemen Bengkel

    </footer>



</div>





<!-- ================= JAVASCRIPT ================= -->


<script src="js/util.js"></script>

<script src="js/app.js"></script>

<script src="js/render.js"></script>

<script src="js/servis.js"></script>

<script src="js/kasir.js"></script>

<script src="js/mekanik.js"></script>

<script src="js/part.js"></script>

<script src="js/setting.js"></script>


</body>
</html>
