<script>
// Perbaikan fungsi loadDataBengkel agar logo tampil di dashboard
function loadDataBengkel(){
    let nama = localStorage.getItem('namaBengkel');
    let alamat = localStorage.getItem('alamatBengkel');
    let logo = localStorage.getItem('logoBengkel');
    
    // Update Dashboard
    document.getElementById('namaDashboard').innerText = nama || 'OTOPOS';
    document.getElementById('alamatDashboard').innerText = alamat || '';
    
    let logoDashboard = document.getElementById('logoDashboard');
    if(logo){
        logoDashboard.src = logo;
        logoDashboard.style.display = 'inline-block';
    } else {
        logoDashboard.style.display = 'none';
    }
    
    // Update Setting (jika halaman setting dibuka)
    let inputNama = document.getElementById('namaBengkel');
    let inputAlamat = document.getElementById('alamatBengkel');
    if(inputNama) inputNama.value = nama || '';
    if(inputAlamat) inputAlamat.value = alamat || '';
}

// Tambahkan inisialisasi di akhir script
window.onload = function() {
    loadDaftarPart();
    loadDaftarMekanik();
    loadDaftarKendaraan();
    loadDataBengkel();
    loadRiwayat();
    loadDashboard();
};
</script>
