<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOPOS - PC Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { position: absolute; left: 0; top: 0; width: 100%; }
        }
        /* Custom scrollbar untuk cart */
        #cart-items::-webkit-scrollbar { width: 4px; }
        #cart-items::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans flex flex-col gap-4 relative">

    <!-- HEADER -->
    <header class="bg-blue-600 text-white p-4 rounded-xl shadow-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🛠️</span>
            <div>
                <h1 class="text-lg font-black tracking-wider">OTOPOS</h1>
                <p class="text-xs text-blue-200">System Bengkel</p>
            </div>
        </div>
        <div class="flex items-center gap-2 text-sm font-bold">
            <button onclick="toggleModal('panduan-modal')" class="bg-blue-500 hover:bg-blue-700 px-3 py-2 rounded-lg transition flex items-center gap-2 border border-blue-400">
                <span class="bg-white text-blue-600 px-1.5 rounded text-[10px] font-black">F1</span> Panduan
            </button>
            <button onclick="toggleModal('settings-modal')" class="bg-blue-800 hover:bg-blue-900 px-3 py-2 rounded-lg transition flex items-center gap-2 border border-blue-500 shadow-lg">
                <span class="bg-white text-blue-800 px-1.5 rounded text-[10px] font-black">F4</span> ⚙️ Pengaturan
            </button>
        </div>
    </header>

    <!-- CONTENT -->
    <div class="grid grid-cols-12 gap-4 flex-1">
        <!-- OPERASIONAL -->
        <main class="col-span-12 lg:col-span-7 bg-white rounded-xl shadow-md border p-5 flex flex-col gap-5">
            <div class="grid grid-cols-2 p-1 bg-gray-100 rounded-xl border">
                <button id="tab-servis" onclick="setMode('servis')" class="py-2.5 rounded-lg font-black text-sm transition-all shadow bg-red-600 text-white flex justify-center items-center gap-2">
                    <span class="bg-white/20 px-1.5 rounded text-[10px]">F2</span> MODE SERVIS
                </button>
                <button id="tab-part" onclick="setMode('part')" class="py-2.5 rounded-lg font-black text-sm transition-all text-gray-500 hover:text-gray-800 flex justify-center items-center gap-2">
                    <span class="bg-gray-200 px-1.5 rounded text-[10px]">F3</span> JUAL PART
                </button>
            </div>

            <div id="form-container" class="space-y-4">
                <div id="group-servis" class="grid grid-cols-2 gap-4 border-b pb-4">
                    <div>
                        <label class="block text-xs font-black text-gray-500 mb-1">NOPOL</label>
                        <input type="text" id="input-nopol" placeholder="D 1234 ABC" class="w-full border rounded-lg p-2.5 text-sm uppercase font-mono outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-500 mb-1">MEKANIK</label>
                        <select id="input-mekanik" class="w-full border rounded-lg p-2.5 text-sm outline-none"></select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-black text-gray-500 mb-1">CARI PRODUK (500+ Data)</label>
                        <input type="text" id="input-produk-search" list="list-produk" placeholder="Ketik nama part..." class="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <datalist id="list-produk"></datalist>
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-500 mb-1">QTY</label>
                        <input type="number" id="input-qty" value="1" class="w-full border rounded-lg p-2.5 text-sm text-center outline-none">
                    </div>
                    <div id="group-jasa" class="col-span-3">
                        <label class="block text-xs font-black text-gray-500 mb-1">BIAYA JASA (RP)</label>
                        <input type="number" id="input-jasa" value="0" class="w-full border rounded-lg p-2.5 text-sm outline-none">
                    </div>
                </div>

                <button onclick="tambahKeBilling()" class="w-full bg-red-600 text-white font-black py-3 rounded-xl shadow-lg transition hover:bg-red-700 text-sm flex justify-center items-center gap-2">
                    ➕ TAMBAH KE KASIR <span class="bg-white/20 px-1.5 rounded text-[10px]">Ctrl + Enter</span>
                </button>
            </div>
        </main>

        <!-- KASIR PANEL -->
        <aside class="col-span-12 lg:col-span-5 bg-slate-900 text-white rounded-xl shadow-md p-5 flex flex-col justify-between">
            <div>
                <h2 class="font-black text-md mb-4 text-emerald-400">🛒 RINGKASAN BILLING</h2>
                <div id="cart-items" class="space-y-2 max-h-[300px] overflow-y-auto"></div>
            </div>
            <div class="border-t border-slate-700 pt-4 mt-4 space-y-4">
                <div class="flex justify-between items-center text-xl font-black">
                    <span>TOTAL:</span>
                    <span id="cart-total">Rp 0</span>
                </div>
                <button onclick="prosesCheckout()" class="w-full bg-emerald-500 text-slate-950 font-black py-3 rounded-xl hover:bg-emerald-600 transition flex justify-center items-center gap-2">
                    🟩 SELESAI & CETAK <span class="bg-black/20 px-1.5 rounded text-[10px]">Ctrl + P</span>
                </button>
            </div>
        </aside>
    </div>

    <!-- MODAL PANDUAN (README) -->
    <div id="panduan-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6">
            <h3 class="font-black mb-4">📖 PANDUAN KASIR</h3>
            <div class="text-xs space-y-2 text-gray-600">
                <p><b>F1:</b> Buka Panduan ini</p>
                <p><b>F2:</b> Mode Servis</p>
                <p><b>F3:</b> Mode Part</p>
                <p><b>F4:</b> Pengaturan (Input Data)</p>
                <p><b>Ctrl + Enter:</b> Tambah ke Keranjang</p>
                <p><b>Ctrl + P:</b> Cetak Struk</p>
            </div>
            <button onclick="toggleModal('panduan-modal')" class="w-full mt-4 bg-slate-800 text-white py-2 rounded-lg font-bold">Tutup</button>
        </div>
    </div>

    <!-- MODAL SETTINGS (IMPORT DATA) -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 max-h-[90vh] overflow-y-auto">
            <h3 class="font-black mb-4">⚙️ PENGATURAN DATA</h3>
            <!-- CSV IMPORT -->
            <div class="mb-6">
                <label class="block text-xs font-bold mb-1 text-blue-600">📥 IMPORT CSV (EXCEL)</label>
                <textarea id="csv-input" class="w-full h-20 border p-2 text-xs" placeholder="Nama,Harga&#10;Oli,50000"></textarea>
                <button onclick="handleImportCSV()" class="w-full bg-blue-600 text-white py-2 mt-2 rounded font-bold text-xs">Simpan Data</button>
            </div>
            <!-- MANUAL ADD -->
            <div class="mb-6">
                <label class="block text-xs font-bold mb-1 text-emerald-600">➕ TAMBAH MANUAL</label>
                <input type="text" id="manual-name" placeholder="Nama Part" class="w-full border p-2 mb-2 text-sm rounded">
                <input type="number" id="manual-price" placeholder="Harga" class="w-full border p-2 text-sm rounded">
                <button onclick="handleManualAdd()" class="w-full bg-emerald-600 text-white py-2 mt-2 rounded font-bold text-xs">Simpan Part</button>
            </div>
            <button onclick="toggleModal('settings-modal')" class="w-full bg-gray-200 py-2 rounded font-bold text-xs">Tutup</button>
        </div>
    </div>

    <!-- PRINT AREA -->
    <div id="print-receipt" class="hidden font-mono p-4 w-[58mm] text-[8px]">
        <div class="text-center font-bold">BENGKEL HELICOPTER</div>
        <hr class="my-2">
        <div id="print-items"></div>
        <hr class="my-2">
        <div class="font-bold text-right" id="print-total"></div>
    </div>

    <script>
        // --- DATA INITIALIZATION ---
        let cart = JSON.parse(localStorage.getItem('otopos_cart')) || [];
        let parts = JSON.parse(localStorage.getItem('otopos_parts')) || [{name: 'Contoh Oli', price: 50000}];
        let currentMode = 'servis';

        // --- STARTUP ---
        window.onload = () => {
            refreshDatalist();
            renderCart();
            document.getElementById('input-mekanik').innerHTML = ['Wowo', 'Joko'].map(m => `<option value="${m}">${m}</option>`).join('');
        };

        // --- SHORTCUTS ---
        document.addEventListener('keydown', (e) => {
            if(e.key === 'F1') { e.preventDefault(); toggleModal('panduan-modal'); }
            if(e.key === 'F2') { e.preventDefault(); setMode('servis'); }
            if(e.key === 'F3') { e.preventDefault(); setMode('part'); }
            if(e.key === 'F4') { e.preventDefault(); toggleModal('settings-modal'); }
            if(e.ctrlKey && e.key === 'Enter') { e.preventDefault(); tambahKeBilling(); }
            if(e.ctrlKey && e.key === 'p') { e.preventDefault(); prosesCheckout(); }
        });

        // --- LOGIC ---
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('group-servis').classList.toggle('hidden', mode === 'part');
            document.getElementById('group-jasa').classList.toggle('hidden', mode === 'part');
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        function refreshDatalist() {
            const list = document.getElementById('list-produk');
            list.innerHTML = '';
            parts.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name;
                opt.setAttribute('data-price', p.price);
                list.appendChild(opt);
            });
        }

        function handleImportCSV() {
            const text = document.getElementById('csv-input').value;
            text.split('\n').forEach(line => {
                const [name, price] = line.split(',');
                if(name && price) parts.push({name: name.trim(), price: parseInt(price)});
            });
            localStorage.setItem('otopos_parts', JSON.stringify(parts));
            refreshDatalist();
            alert('Import Berhasil!');
        }

        function handleManualAdd() {
            const name = document.getElementById('manual-name').value;
            const price = document.getElementById('manual-price').value;
            if(name && price) {
                parts.push({name, price: parseInt(price)});
                localStorage.setItem('otopos_parts', JSON.stringify(parts));
                refreshDatalist();
                alert('Part tersimpan');
            }
        }

        function tambahKeBilling() {
            const name = document.getElementById('input-produk-search').value;
            const item = parts.find(p => p.name === name);
            if(!item) return alert('Produk tidak ditemukan!');
            
            cart.push({ ...item, qty: parseInt(document.getElementById('input-qty').value) || 1 });
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between bg-slate-800 p-2 rounded text-xs">
                    <span>${i.name} (x${i.qty})</span>
                    <span>Rp ${(i.price * i.qty).toLocaleString()}</span>
                </div>
            `).join('');
            const total = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);
            document.getElementById('cart-total').innerText = 'Rp ' + total.toLocaleString();
        }

        function prosesCheckout() {
            window.print();
            cart = [];
            renderCart();
        }
    </script>
</body>
</html>
